services:
  - type: web
    name: shivshakti-api
    runtime: node
    plan: free
    buildCommand: npm install && npm run build -w backend
    startCommand: npm run start:prod -w backend
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
